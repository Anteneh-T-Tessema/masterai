<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LLM Basics | Golden Standard Specialization</title>
    <meta name="description" content="The ultimate professional specialization in Large Language Models.">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <button class="mobile-toggle" id="mobile-toggle">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
    </button>

    <div class="app-container">
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo" onclick="window.location.href='index.html'">
                    <div class="logo-icon">L</div>
                    <h1>LLM Basics</h1>
                </div>
            </div>

            <div class="search-container">
                <input type="text" id="sidebar-search" placeholder="Search curriculum..." autocomplete="off">
            </div>

            <nav class="chapter-list">
                <div class="sidebar-section-title">CURRICULUM</div>
                <div id="chapter-list"></div>
                
                <div class="sidebar-section-title" style="margin-top: 2rem">LABS</div>
                <div class="unit-item" onclick="loadPlayground()">
                    <span style="margin-right: 8px">🧪</span> Prompt Playground
                </div>
                <div class="unit-item" onclick="exportStudyMaterials()">
                    <span style="margin-right: 8px">📥</span> Export Study Guide
                </div>
            </nav>

            <div class="sidebar-footer">
                <div class="progress-info">
                    <span>Specialization Mastery</span>
                    <span id="progress-percent">0%</span>
                </div>
                <div class="progress-bar">
                    <div class="progress-fill" id="progress-fill"></div>
                </div>
            </div>
        </aside>

        <main class="content-area">
            <header class="content-header">
                <div id="breadcrumb">Specialization Dashboard</div>
                <div class="theme-toggle" title="Toggle Theme">
                    <div class="dot"></div>
                </div>
            </header>

            <article class="chapter-content" id="chapter-content">
                <!-- Content injected here -->
            </article>

            <footer class="content-nav" id="content-nav">
                <button id="prev-btn" class="nav-btn">← Back</button>
                <button id="next-btn" class="nav-btn">Continue →</button>
            </footer>
        </main>
    </div>

    <!-- Certificate Modal -->
    <div id="cert-modal" class="modal">
        <div class="modal-content certificate-container" id="certificate-render">
            <!-- Dynamic Certificate Content -->
        </div>
        <div style="text-align: center; margin-top: 2rem">
            <button class="nav-btn" onclick="closeCert()">Close Preview</button>
            <button class="nav-btn" style="background: var(--accent-color); color: white" onclick="window.print()">Print / Save PDF</button>
        </div>
    </div>

    <!-- Completion Modal -->
    <div id="completion-modal" class="modal">
        <div class="modal-content">
            <div class="modal-icon">🏆</div>
            <h2>Specialization Mastered!</h2>
            <p>You have successfully completed all 9 modules with distinction.</p>
            <button class="nav-btn" style="background: var(--accent-color); color: white; margin-top: 1rem" onclick="showCertificate()">View Certificate</button>
            <button class="nav-btn" onclick="closeModal()">Back to Dashboard</button>
        </div>
    </div>

    <!-- Modular Data Scripts -->
    <script src="data/media_basics.js"></script>
    <script src="data/glossary.js"></script>
    
    <script>
        window.COURSE_ID = "media"; 
        window.COURSE_TITLE = "AI for Media & Gaming"; 
        window.CHAPTERS_DATA.sort((a, b) => a.id - b.id);
    </script>
    
    <script src="app.js"></script>
</body>
</html>
