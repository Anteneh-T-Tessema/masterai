<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Academy Insights | Institutional Research & Analysis</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --midnight: #0a0c10;
            --accent-color: #58a6ff;
            --text-dim: #8b949e;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --border-color: rgba(255, 255, 255, 0.1);
        }
        body {
            background: var(--midnight);
            color: white;
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
        }
        .container { max-width: 1200px; margin: 0 auto; padding: 2rem; }
        
        /* Header */
        header { text-align: center; padding: 6rem 0; border-bottom: 1px solid var(--border-color); }
        h1 { font-family: 'Outfit', sans-serif; font-size: 4rem; margin: 0; letter-spacing: -0.04em; font-weight: 900; }
        .subtitle { color: var(--text-dim); font-size: 1.2rem; margin-top: 1rem; max-width: 600px; margin-left: auto; margin-right: auto; }

        /* Blog Grid */
        .blog-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 3rem;
            margin-top: 4rem;
        }
        .post-card {
            background: var(--glass-bg);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            overflow: hidden;
            transition: all 0.3s;
            cursor: pointer;
            display: flex;
            flex-direction: column;
        }
        .post-card:hover { transform: translateY(-10px); border-color: var(--accent-color); box-shadow: 0 30px 60px rgba(0,0,0,0.4); }
        
        .post-img { height: 200px; background: #1a1a1a; display: flex; align-items: center; justify-content: center; font-size: 3rem; position: relative; }
        .post-img::after { content: ''; position: absolute; inset: 0; background: linear-gradient(0deg, var(--midnight) 0%, transparent 100%); }
        
        .post-content { padding: 2rem; flex-grow: 1; display: flex; flex-direction: column; }
        .post-meta { font-size: 0.7rem; color: var(--accent-color); font-weight: 800; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 0.75rem; }
        .post-title { font-family: 'Outfit', sans-serif; font-size: 1.5rem; font-weight: 700; margin-bottom: 1rem; line-height: 1.3; }
        .post-summary { font-size: 0.9rem; color: var(--text-dim); line-height: 1.6; margin-bottom: 2rem; }
        
        .post-footer { margin-top: auto; display: flex; justify-content: space-between; align-items: center; font-size: 0.8rem; color: var(--text-dim); border-top: 1px solid var(--border-color); padding-top: 1.5rem; }
        
        .nav-link { position: absolute; top: 2rem; left: 2rem; color: var(--text-dim); text-decoration: none; font-size: 0.9rem; font-weight: 700; }
        .nav-link:hover { color: white; }

        .cta-btn { background: var(--accent-color); color: white; border: none; padding: 0.8rem 1.5rem; border-radius: 10px; font-weight: 700; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="nav-link">← RETURN TO ACADEMY PORTAL</a>
        
        <header>
            <div style="font-size: 0.7rem; color: var(--accent-color); font-weight: 900; letter-spacing: 0.3em; text-transform: uppercase; margin-bottom: 1rem;">Frontier Analysis</div>
            <h1>Academy Insights</h1>
            <div class="subtitle">Institutional research, market analysis, and frontier engineering whitepapers from our global network of experts.</div>
        </header>

        <div class="blog-grid" id="blog-grid">
            <!-- Dynamic Injection -->
        </div>
    </div>

    <script src="data/blog_posts.js"></script>
    <script src="data/registry.js"></script>
    <script>
        function renderBlog() {
            const grid = document.getElementById('blog-grid');
            const posts = window.ACADEMY_BLOG_POSTS;

            grid.innerHTML = posts.map(post => `
                <div class="post-card" onclick="window.location.href='course.html?id=${post.track_link}'">
                    <div class="post-img">
                        ${window.ACADEMY_REGISTRY[post.track_link]?.icon || '📄'}
                    </div>
                    <div class="post-content">
                        <div class="post-meta">${post.category} • ${post.date}</div>
                        <div class="post-title">${post.title}</div>
                        <div class="post-summary">${post.summary}</div>
                        <div class="post-footer">
                            <span>By ${post.author}</span>
                            <span style="color: var(--accent-color)">Read Analysis →</span>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        window.addEventListener('DOMContentLoaded', renderBlog);
    </script>
</body>
</html>
